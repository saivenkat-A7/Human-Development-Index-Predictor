# =============================================================================
# render.yaml — Render Blueprint for HDI Predictor
# =============================================================================
# Application : Human Development Index (HDI) Predictor
# Tech Stack  : Python 3.11 · Flask 3.0 · Gunicorn · scikit-learn · Matplotlib
# Runtime     : Docker (uses Dockerfile — guarantees Python 3.11-slim)
# Why Docker  : Render's native Python runtime defaults to the latest Python
#               (3.14), which is incompatible with pandas 2.2.2. Using Docker
#               ensures the exact Python version defined in the Dockerfile is
#               always used, regardless of what Render installs by default.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Web Service — Docker-based (Flask + Gunicorn inside python:3.11-slim)
  # ---------------------------------------------------------------------------
  - type: web
    name: hdi-predictor
    runtime: docker                    # Use the project's own Dockerfile
    dockerfilePath: ./Dockerfile       # Path relative to repo root
    region: oregon                     # US-West (Oregon) — Render's default free-tier region
    plan: free                         # Upgrade to "starter" ($7/mo) for always-on uptime

    # ── Health Check ─────────────────────────────────────────────────────────
    healthCheckPath: /

    # ── Auto-Deploy ──────────────────────────────────────────────────────────
    autoDeploy: true

    # ── Environment Variables ─────────────────────────────────────────────────
    # NOTE: When runtime is "docker", Render does NOT inject $PORT automatically
    # into the container — the Dockerfile CMD binds to port 5000 directly, and
    # Render proxies to it. The PORT env var below ensures Flask/Gunicorn inside
    # the container uses the correct port.
    envVars:
      # Flask secret key — auto-generated by Render (cryptographically secure).
      - key: SECRET_KEY
        generateValue: true

      - key: FLASK_ENV
        value: production

      - key: FLASK_DEBUG
        value: "0"

      - key: PYTHONUNBUFFERED
        value: "1"
